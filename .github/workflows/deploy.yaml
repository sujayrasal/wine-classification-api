# ─────────────────────────────────────────
# Expt 7: CI/CD Pipeline - Wine Classification API
# Trigger: Every push to main branch
# Actions: Build Docker image → Push to Docker Hub
# ─────────────────────────────────────────

name: Build and Deploy Wine API

# ── When to trigger ──────────────────────
on:
  push:
    branches:
      - main        # Triggers on every push to main
  pull_request:
    branches:
      - main        # Also triggers on pull requests

# ── Jobs ──────────────────────────────────
jobs:

  # ── Job 1: Run Tests ────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up Python
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Train model (generate .pkl files)
      - name: Train model to generate pkl files
        run: python train_model.py

      # 5. Test API starts correctly
      - name: Test API health
        run: |
          echo "API_KEY=wine-secret-key-2024" > .env
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/ || exit 1
          echo "✅ Health check passed!"

  # ── Job 2: Build and Push Docker Image ──
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test          # Only runs if test job passes

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Train model to generate .pkl files
      - name: Set up Python and train model
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies and train model
        run: |
          pip install -r requirements.txt
          python train_model.py

      # 3. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Set up Docker Buildx (for multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/wine-classification-api:latest
            ${{ secrets.DOCKER_USERNAME }}/wine-classification-api:${{ github.sha }}

      # 6. Print success message
      - name: Deployment complete
        run: |
          echo "✅ Docker image pushed successfully!"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/wine-classification-api:latest"
